name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy kubemin_agent

      - name: Pytest (global coverage gate)
        run: pytest --cov=kubemin_agent --cov-fail-under=80 --cov-report=xml --cov-report=term

      - name: Module Coverage Gate
        run: python3 scripts/check_module_coverage.py coverage.xml
